version: '3.8'

services:
  # Zookeeper for Kafka coordination
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: ecommerce-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - ecommerce-network

  # Kafka Message Broker
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: ecommerce-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,EXTERNAL://0.0.0.0:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    networks:
      - ecommerce-network

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: ecommerce-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_MULTIPLE_DATABASES: orderdb,inventorydb,keycloakdb
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh
    networks:
      - ecommerce-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: ecommerce-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - ecommerce-network

  # Zipkin Distributed Tracing
  zipkin:
    image: openzipkin/zipkin:latest
    container_name: ecommerce-zipkin
    ports:
      - "9411:9411"
    networks:
      - ecommerce-network

  # Loki (Centralized Logging)
  loki:
    image: grafana/loki:2.9.2
    container_name: ecommerce-loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - ecommerce-network

  # Grafana (Metrics & Logs Dashboard)
  grafana:
    image: grafana/grafana:10.2.2
    container_name: ecommerce-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    entrypoint:
      - sh
      - -c
      - |
        mkdir -p /etc/grafana/provisioning/datasources
        cat <<EOF > /etc/grafana/provisioning/datasources/ds.yaml
        apiVersion: 1
        datasources:
        - name: Loki
          type: loki
          access: proxy
          url: http://loki:3100
          jsonData:
            tlsAuth: false
            tlsAuthWithCACert: false
        - name: Zipkin
          type: zipkin
          access: proxy
          url: http://zipkin:9411
        EOF
        /run.sh
    depends_on:
      - loki
      - zipkin
    networks:
      - ecommerce-network

  # Keycloak Identity Provider
  keycloak:
    image: quay.io/keycloak/keycloak:23.0
    container_name: ecommerce-keycloak
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloakdb
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: postgres
      KC_HOSTNAME_STRICT: false
      KC_HTTP_ENABLED: true
    command: start-dev
    ports:
      - "8090:8080"
    depends_on:
      - postgres
    networks:
      - ecommerce-network

  # Discovery Server
  discovery-server:
    build:
      context: .
      dockerfile: eureka-server/Dockerfile
    container_name: discovery-server
    ports:
      - "8761:8761"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    networks:
      - ecommerce-network

  # API Gateway
  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: api-gateway
    ports:
      - "8085:8085"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - ZIPKIN_ENDPOINT=http://zipkin:9411/api/v2/spans
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - KEYCLOAK_ISSUER_URI=http://localhost:8090/realms/ecommerce
      - KEYCLOAK_JWK_SET_URI=http://keycloak:8080/realms/ecommerce/protocol/openid-connect/certs
      - MANAGEMENT_LOKI_URL=http://loki:3100/loki/api/v1/push
    depends_on:
      - discovery-server
      - keycloak
      - zipkin
    networks:
      - ecommerce-network

  # Frontend (React + Vite)
  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=http://localhost:8085
        - VITE_KEYCLOAK_URL=http://localhost:8090
        - VITE_KEYCLOAK_REALM=ecommerce
        - VITE_KEYCLOAK_CLIENT_ID=ecommerce-gateway
    container_name: ecommerce-frontend
    ports:
      - "3001:80"
    depends_on:
      - api-gateway
    networks:
      - ecommerce-network

  # Order Service
  order-service:
    build:
      context: .
      dockerfile: order-service/Dockerfile
    container_name: order-service
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_APPLICATION_JSON={"spring.kafka.bootstrap-servers":"kafka:9092"}
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/orderdb
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - ZIPKIN_ENDPOINT=http://zipkin:9411/api/v2/spans
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
      - MANAGEMENT_LOKI_URL=http://loki:3100/loki/api/v1/push
    depends_on:
      - discovery-server
      - postgres
      - kafka
      - zipkin
    networks:
      - ecommerce-network

  # Inventory Service
  inventory-service:
    build:
      context: .
      dockerfile: inventory-service/Dockerfile
    container_name: inventory-service
    ports:
      - "8082:8082"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_APPLICATION_JSON={"spring.kafka.bootstrap-servers":"kafka:9092"}
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/inventorydb
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - ZIPKIN_ENDPOINT=http://zipkin:9411/api/v2/spans
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
      - MANAGEMENT_LOKI_URL=http://loki:3100/loki/api/v1/push
    depends_on:
      - discovery-server
      - postgres
      - kafka
      - zipkin
    networks:
      - ecommerce-network

  # Notification Service
  notification-service:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    container_name: notification-service
    ports:
      - "8083:8083"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_APPLICATION_JSON={"spring.kafka.bootstrap-servers":"kafka:9092"}
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - ZIPKIN_ENDPOINT=http://zipkin:9411/api/v2/spans
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
      - MANAGEMENT_LOKI_URL=http://loki:3100/loki/api/v1/push
      - MAIL_HOST=maildev
      - MAIL_PORT=1025
    depends_on:
      - maildev
    networks:
      - ecommerce-network

  # Payment Service
  payment-service:
    build:
      context: .
      dockerfile: payment-service/Dockerfile
    container_name: payment-service
    ports:
      - "8084:8084"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_APPLICATION_JSON={"spring.kafka.bootstrap-servers":"kafka:9092"}
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/paymentdb
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - ZIPKIN_ENDPOINT=http://zipkin:9411/api/v2/spans
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
      - MANAGEMENT_LOKI_URL=http://loki:3100/loki/api/v1/push
      - STRIPE_API_KEY=${STRIPE_SECRET_KEY}
    depends_on:
      - discovery-server
      - postgres
      - kafka
      - zipkin
    networks:
      - ecommerce-network

  # MailDev (Fake SMTP Server)
  maildev:
    image: maildev/maildev
    container_name: ecommerce-maildev
    ports:
      - "1080:1080" # Web UI
      - "1025:1025" # SMTP Port
    networks:
      - ecommerce-network

networks:
  ecommerce-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
